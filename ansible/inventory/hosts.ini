[ubuntu_servers]
# Example Ubuntu target host.
# Replace with your server public IP or DNS name.
ubuntu-prod-01 ansible_host=203.0.113.10

[ubuntu_servers:vars]
# Use a non-root sudo user.
ansible_user=ubuntu

# Use key-based authentication (recommended).
ansible_ssh_private_key_file=~/.ssh/id_rsa

# Optional: set Python interpreter explicitly for consistency.
ansible_python_interpreter=/usr/bin/python3

