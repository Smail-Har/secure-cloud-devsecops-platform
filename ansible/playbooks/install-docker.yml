---
# Install Docker Engine on Ubuntu hosts using Docker's official APT repository.
# Usage:
#   ansible-playbook -i ansible/inventory/hosts.ini ansible/playbooks/install-docker.yml
# Optional override:
#   -e docker_admin_user=smail

- name: Install and Configure Docker on Ubuntu
  hosts: ubuntu_servers
  become: true
  gather_facts: true

  vars:
    # Configurable user that will be added to the docker group.
    # Defaults to the SSH connection user from inventory.
    docker_admin_user: "{{ ansible_user | default('ubuntu') }}"

  tasks:
    - name: Ensure target OS is Ubuntu
      ansible.builtin.assert:
        that:
          - ansible_facts.distribution == "Ubuntu"
        fail_msg: "This playbook supports Ubuntu only."

    - name: Install Docker APT prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: true

    - name: Ensure keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker APT repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ ansible_facts.architecture | replace('x86_64', 'amd64') }} signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu {{ ansible_facts.distribution_release }} stable
        filename: docker
        state: present

    - name: Install Docker packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Ensure Docker service is enabled and running
      ansible.builtin.service:
        name: docker
        enabled: true
        state: started

    - name: Ensure docker group exists
      ansible.builtin.group:
        name: docker
        state: present

    - name: Add configured user to docker group
      ansible.builtin.user:
        name: "{{ docker_admin_user }}"
        groups: docker
        append: true

    - name: Inform user about group membership refresh
      ansible.builtin.debug:
        msg: >-
          User '{{ docker_admin_user }}' added to docker group.
          Re-login is required for group membership to apply.

