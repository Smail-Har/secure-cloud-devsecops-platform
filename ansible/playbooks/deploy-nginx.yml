---
# Deploy NGINX as a Docker container.
# Prerequisite: Docker must be installed (run install-docker.yml first).

- name: Deploy NGINX Container
  hosts: ubuntu_servers
  become: true
  gather_facts: true
  collections:
    - community.docker

  vars:
    nginx_container_name: nginx-web
    nginx_image: nginx:stable-alpine
    nginx_host_port: "80"
    nginx_container_port: "80"

  tasks:
    - name: Ensure target OS is Ubuntu
      ansible.builtin.assert:
        that:
          - ansible_facts.distribution == "Ubuntu"
        fail_msg: "This playbook supports Ubuntu only."

    - name: Ensure Docker service is enabled and running
      ansible.builtin.service:
        name: docker
        enabled: true
        state: started

    # docker_container requires Python Docker SDK on managed host.
    - name: Install Python Docker SDK dependency
      ansible.builtin.apt:
        name: python3-docker
        state: present
        update_cache: true

    - name: Pull NGINX image
      community.docker.docker_image:
        name: "{{ nginx_image }}"
        source: pull

    - name: Run or update NGINX container
      community.docker.docker_container:
        name: "{{ nginx_container_name }}"
        image: "{{ nginx_image }}"
        state: started
        restart_policy: always
        recreate: false
        pull: missing
        published_ports:
          - "{{ nginx_host_port }}:{{ nginx_container_port }}"

