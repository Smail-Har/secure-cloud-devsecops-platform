---
# DevSecOps CI pipeline for secure-cloud-devsecops-platform.
#
# Runs on every push and pull request.
# Stages:
#   0. Gitleaks — secrets and credential detection (full git history)
#   1. Terraform validation (fmt, init, validate) + Checkov IaC scan
#   2. Ansible lint
#   3. Docker image build + Trivy vulnerability scan

name: DevSecOps Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Minimal token permissions — no writes needed for this pipeline.
permissions:
  contents: read

jobs:
  devsecops:
    name: DevSecOps Checks
    runs-on: ubuntu-latest

    steps:
      # ──────────────────────────────────────────────────────────────────────
      # CHECKOUT
      # Full history (fetch-depth: 0) is required by Gitleaks to scan all
      # commits, not just the latest snapshot.
      # ──────────────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ──────────────────────────────────────────────────────────────────────
      # SECRETS DETECTION
      # Gitleaks scans the entire commit history for accidentally committed
      # credentials, API keys, tokens, and other secrets.
      # Runs before all other steps — secrets found here block the pipeline.
      # ──────────────────────────────────────────────────────────────────────
      - name: Detect secrets with Gitleaks
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace:ro" \
            ghcr.io/gitleaks/gitleaks:v8.21.2 detect \
            --source /workspace \
            --redact \
            --exit-code 1

      # ──────────────────────────────────────────────────────────────────────
      # SETUP TERRAFORM
      # Pin to a specific minor series for reproducible runs.
      # ──────────────────────────────────────────────────────────────────────
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      # ──────────────────────────────────────────────────────────────────────
      # TERRAFORM CHECKS
      # fmt  — enforces canonical formatting (fails on any diff).
      # init — downloads providers locally without configuring a backend.
      # validate — verifies syntax and internal consistency.
      # ──────────────────────────────────────────────────────────────────────
      - name: Terraform format check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      # ──────────────────────────────────────────────────────────────────────
      # IAC SECURITY SCAN
      # Checkov analyses Terraform code against 1000+ security policies
      # (CIS Benchmarks, NIST, AWS Security Hub).
      # soft_fail: true — findings are reported but do not block the pipeline.
      # Tighten to soft_fail: false once known intentional shortcuts are
      # documented as suppressed checks in a .checkov.yaml config file.
      # ──────────────────────────────────────────────────────────────────────
      - name: IaC scan with Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          soft_fail: true

      # ──────────────────────────────────────────────────────────────────────
      # SETUP PYTHON
      # Required for ansible-lint and its dependencies.
      # ──────────────────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      # ──────────────────────────────────────────────────────────────────────
      # INSTALL ANSIBLE-LINT
      # Also install Ansible collections used by the playbooks so the linter
      # can resolve module references (community.general, community.docker).
      # ──────────────────────────────────────────────────────────────────────
      - name: Install ansible-lint
        run: pip install -r requirements-dev.txt

      - name: Show Ansible tool versions
        run: |
          python --version
          ansible --version
          ansible-lint --version

      - name: Install required Ansible collections
        run: |
          ansible-galaxy collection install \
            community.general \
            community.docker

      # ──────────────────────────────────────────────────────────────────────
      # ANSIBLE CHECKS
      # Lint all playbooks against Ansible best-practice rules.
      # ──────────────────────────────────────────────────────────────────────
      - name: Run ansible-lint on playbooks
        run: ansible-lint ansible/playbooks/*.yml

      # ──────────────────────────────────────────────────────────────────────
      # DOCKER BUILD
      # Build the hardened NGINX image without pushing it to a registry.
      # Buildx is set up first to enable BuildKit features.
      # ──────────────────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: docker/nginx-secure
          push: false
          # Tag with the commit SHA for traceability within the job.
          tags: nginx-secure:${{ github.sha }}
          # Export the image to Docker daemon so Trivy can inspect it.
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ──────────────────────────────────────────────────────────────────────
      # TRIVY VULNERABILITY SCAN
      # Scan the built image for known CVEs.
      # Fails the pipeline on any unfixed CRITICAL or HIGH findings.
      # ──────────────────────────────────────────────────────────────────────
      - name: Scan Docker image with Trivy (containerized fallback)
        run: |
          TRIVY_IMAGE="aquasec/trivy:0.56.2"
          if ! docker pull "${TRIVY_IMAGE}"; then
            echo "Pinned Trivy image not available, falling back to latest."
            TRIVY_IMAGE="aquasec/trivy:latest"
            docker pull "${TRIVY_IMAGE}"
          fi

          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            "${TRIVY_IMAGE}" image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            --pkg-types os,library \
            nginx-secure:${{ github.sha }}
