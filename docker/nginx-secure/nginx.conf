# Minimal, security-focused NGINX configuration for containerized deployment.

worker_processes auto;

# Non-root write locations compatible with container execution.
pid /tmp/nginx.pid;

events {
	worker_connections 1024;
	multi_accept on;
}

http {
	include       /etc/nginx/mime.types;
	default_type  application/octet-stream;

	# Hide NGINX version information.
	server_tokens off;

	# Logging to stdout/stderr for container platforms.
	log_format main '$remote_addr - $remote_user [$time_local] "$request" '
					'$status $body_bytes_sent "$http_referer" '
					'"$http_user_agent" "$http_x_forwarded_for"';
	access_log /dev/stdout main;
	error_log  /dev/stderr warn;

	# Basic hardening and sensible operational defaults.
	sendfile on;
	tcp_nopush on;
	tcp_nodelay on;
	keepalive_timeout 30;
	keepalive_requests 100;
	reset_timedout_connection on;
	types_hash_max_size 2048;

	# Size and timeout controls to reduce abuse surface.
	client_max_body_size 1m;
	client_body_timeout 10s;
	client_header_timeout 10s;
	send_timeout 10s;

	# Use container-writable temp paths under /tmp.
	client_body_temp_path /tmp/client_temp;
	proxy_temp_path       /tmp/proxy_temp;
	fastcgi_temp_path     /tmp/fastcgi_temp;
	uwsgi_temp_path       /tmp/uwsgi_temp;
	scgi_temp_path        /tmp/scgi_temp;

	# Optional compression for text-based responses.
	gzip on;
	gzip_vary on;
	gzip_min_length 1024;
	gzip_types text/plain text/css application/json application/javascript application/xml;

	server {
		listen 80 default_server;
		listen [::]:80 default_server;
		server_name _;

		root /usr/share/nginx/html;
		index index.html;

		# Common security headers.
		add_header X-Content-Type-Options "nosniff" always;
		add_header X-Frame-Options "DENY" always;
		add_header Referrer-Policy "strict-origin-when-cross-origin" always;
		add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
		add_header Content-Security-Policy "default-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'" always;

		# Only serve existing files, otherwise return 404.
		location / {
			try_files $uri $uri/ =404;
		}

		# Deny hidden file access (except ACME well-known paths).
		location ~ /\.(?!well-known) {
			deny all;
			access_log off;
			log_not_found off;
		}
	}
}

